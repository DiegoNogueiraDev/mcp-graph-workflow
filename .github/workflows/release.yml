name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PAT }}

      - name: Auto-merge release PR
        if: "!steps.release.outputs.release_created"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR=$(gh pr list --repo "$REPO" --label "autorelease: pending" --json number --jq '.[0].number')
          if [ -n "$PR" ]; then
            echo "Enabling auto-merge on PR #$PR"
            gh pr merge "$PR" --repo "$REPO" --auto --squash --delete-branch
          fi

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm

    steps:
      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: 'build-and-test (ubuntu-latest, 22)'
          wait-interval: 15
          allowed-conclusions: success

      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache dashboard dependencies
        id: dashboard-cache
        uses: actions/cache@v4
        with:
          path: src/web/dashboard/node_modules
          key: dashboard-ubuntu-latest-node22-${{ hashFiles('src/web/dashboard/package-lock.json') }}

      - name: Install dashboard dependencies
        if: steps.dashboard-cache.outputs.cache-hit != 'true'
        run: cd src/web/dashboard && npm ci

      - name: Build
        run: npm run build

      - name: Verify package (dry run)
        run: npm publish --dry-run --access public

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
