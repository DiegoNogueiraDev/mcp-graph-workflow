name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Security audit (production deps)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm audit --audit-level=high --omit=dev

      - name: Install dependencies
        run: npm ci

      - name: Cache dashboard dependencies
        id: dashboard-cache
        uses: actions/cache@v4
        with:
          path: src/web/dashboard/node_modules
          key: dashboard-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('src/web/dashboard/package-lock.json') }}

      - name: Install dashboard dependencies
        if: steps.dashboard-cache.outputs.cache-hit != 'true'
        run: cd src/web/dashboard && npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        if: "!(matrix.os == 'ubuntu-latest' && matrix.node-version == 22)"
        run: npm test

      - name: Test with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run test:coverage

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
