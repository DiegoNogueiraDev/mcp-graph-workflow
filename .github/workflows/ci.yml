name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Security audit (production deps)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm audit --audit-level=high --omit=dev

      - name: Install dependencies
        run: npm ci

      - name: Cache dashboard dependencies
        id: dashboard-cache
        uses: actions/cache@v4
        with:
          path: src/web/dashboard/node_modules
          key: dashboard-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('src/web/dashboard/package-lock.json') }}

      - name: Install dashboard dependencies
        if: steps.dashboard-cache.outputs.cache-hit != 'true'
        run: cd src/web/dashboard && npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        if: "!(matrix.os == 'ubuntu-latest' && matrix.node-version == 22)"
        run: npm test

      - name: Test with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run test:coverage

      - name: Check build size
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "## Build Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          SIZE_BYTES=$(du -sb dist/ | cut -f1)
          if [ "$SIZE_BYTES" -gt 5242880 ]; then
            echo "⚠️ Warning: dist/ exceeds 5MB ($SIZE)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Package dry-run
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: |
          npm pack --dry-run 2>&1 | tail -20
          echo "## Package Contents" >> $GITHUB_STEP_SUMMARY
          npm pack --dry-run 2>&1 | grep -E "^npm notice" >> $GITHUB_STEP_SUMMARY || true

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: e2e-${{ github.sha }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install dashboard deps
        run: cd src/web/dashboard && npm ci
      - name: Build
        run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
